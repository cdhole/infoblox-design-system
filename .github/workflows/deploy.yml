name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build Angular app
        run: npx ng build --configuration production --base-href "/infoblox-design-system/"

      - name: Copy index.html to 404.html for SPA routing
        run: cp dist/infoblox-design-system/browser/index.html dist/infoblox-design-system/browser/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/infoblox-design-system/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
